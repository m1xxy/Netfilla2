<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NetFilla Admin - Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://fonts.cdnfonts.com/css/akira-expanded');

        :root { --primary-red: #E50914; --bg-black: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Outfit', sans-serif; background-color: var(--bg-black); color: #ffffff; -webkit-font-smoothing: antialiased; }
        
        .font-akira { font-family: 'Akira Expanded', sans-serif; letter-spacing: 1px; }

        ::-webkit-scrollbar { width: 6px; height: 6px; background: transparent; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        
        /* iOS Glass Morphism Utilities */
        .ios-glass { background: rgba(20, 20, 20, 0.65); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .ios-glass-heavy { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .ios-glass-light { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .admin-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; padding: 14px 20px; width: 100%; outline: none; transition: all 0.3s ease; backdrop-filter: blur(10px); }
        .admin-input:focus { background: rgba(255,255,255,0.1); border-color: var(--primary-red); box-shadow: 0 0 15px rgba(229,9,20,0.2); }
        
        select.admin-input option { background-color: #111; color: white; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex items-center justify-center relative bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-red-900/20 via-black to-black">

    <!-- ADMIN LOGIN SCREEN -->
    <div id="admin-login-screen" class="w-full max-w-md p-8 ios-glass rounded-3xl shadow-2xl flex flex-col gap-6 text-center mx-4 relative z-10">
        <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-32 h-32 bg-[#E50914] rounded-full blur-[70px] opacity-30 pointer-events-none"></div>
        <div class="relative z-10">
            <h1 class="text-4xl font-black text-[#E50914] tracking-tighter mb-1 font-akira">NETFILLA</h1>
            <h2 class="text-xl font-bold text-white tracking-wide">ADMIN PORTAL</h2>
            <p class="text-xs text-gray-400 mt-2 font-medium uppercase tracking-widest">Authorized personnel only</p>
        </div>
        <form id="admin-login-form" class="flex flex-col gap-4 mt-2 relative z-10">
            <!-- Type changed to text so NetFilla@admin is accepted by browser validation -->
            <input type="text" id="admin-email" placeholder="Admin ID" class="admin-input" required>
            <input type="password" id="admin-password" placeholder="Admin Password" class="admin-input" required>
            <button type="submit" id="admin-login-btn" class="w-full bg-[#E50914] hover:bg-red-700 text-white font-bold py-4 rounded-xl mt-2 transition shadow-[0_0_20px_rgba(229,9,20,0.3)] active:scale-95 text-[15px] tracking-wide">Login to Dashboard</button>
        </form>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-dashboard" class="hidden w-full h-full flex flex-col relative z-10">
        
        <!-- Top Navbar -->
        <header class="w-full h-[70px] ios-glass-heavy flex items-center justify-between px-6 z-40 sticky top-0">
            <div class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-md"><path d="M4 4L9 20L15 4L20 20" stroke="#E50914" stroke-width="4"/></svg>
                <h1 class="text-xl font-black text-[#E50914] tracking-tighter font-akira mt-1">NETFILLA <span class="text-gray-400 text-[10px] tracking-widest ml-2 align-middle">ADMIN</span></h1>
            </div>
            <button onclick="adminLogout()" class="ios-glass-light hover:bg-red-500/10 border border-red-500/20 text-red-500 px-5 py-2 rounded-full text-xs font-bold transition active:scale-95 shadow-sm">Sign Out</button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-6 md:p-10">
            
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <div>
                    <h2 class="text-3xl font-black text-white mb-1 tracking-tight drop-shadow-md">User Management</h2>
                    <p class="text-gray-400 text-sm font-medium">Manage users, adjust subscriptions, and control access.</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="openModal('add-user-modal')" class="flex items-center gap-2 bg-[#E50914] text-white px-5 py-2.5 rounded-xl font-bold hover:bg-red-700 transition active:scale-95 shadow-[0_4px_15px_rgba(229,9,20,0.3)] text-sm">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Add User
                    </button>
                    <button onclick="fetchUsers()" class="flex items-center gap-2 ios-glass-light text-white px-5 py-2.5 rounded-xl font-bold hover:bg-white/10 transition active:scale-95 shadow-sm text-sm">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg> Refresh
                    </button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="ios-glass rounded-2xl overflow-x-auto shadow-2xl pb-4">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-white/5 border-b border-white/10 text-gray-400 text-[11px] font-bold uppercase tracking-widest">
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4">Name / Email</th>
                            <th class="px-6 py-4">Phone</th>
                            <th class="px-6 py-4">Plan & Expiry</th>
                            <th class="px-6 py-4 text-center">Manage Sub</th>
                            <th class="px-6 py-4 text-center">User Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-gray-500 font-medium">
                                <div class="animate-spin w-8 h-8 border-4 border-[#E50914] border-t-transparent rounded-full mx-auto mb-3"></div>
                                Loading database...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL: ADD USER -->
    <div id="add-user-modal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-2xl flex items-center justify-center p-4">
        <div class="ios-glass w-full max-w-md rounded-3xl shadow-2xl p-8 relative">
            <button onclick="closeModal('add-user-modal')" class="absolute top-5 right-5 text-gray-400 hover:text-white bg-white/10 p-2 rounded-full active:scale-95 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            <h2 class="text-2xl font-black text-white mb-6 tracking-tight">Create New User</h2>
            <form id="add-user-form" class="flex flex-col gap-4">
                <input type="text" id="new-name" placeholder="Full Name" class="admin-input" required>
                <input type="email" id="new-email" placeholder="Email Address" class="admin-input" required>
                <input type="tel" id="new-phone" placeholder="Phone (e.g. +923001234567)" class="admin-input">
                <input type="password" id="new-pass" placeholder="Password (Min 6 chars)" class="admin-input" required>
                
                <div class="mt-2">
                    <label class="text-xs text-gray-400 font-bold uppercase mb-2 block tracking-wider pl-1">Starting Plan</label>
                    <select id="new-plan" class="admin-input cursor-pointer appearance-none">
                        <option value="free">Free Plan</option>
                        <option value="week">1 Week (30 Rs)</option>
                        <option value="month">1 Month (120 Rs)</option>
                        <option value="year">1 Year (1000 Rs)</option>
                    </select>
                </div>

                <button type="submit" id="add-user-btn" class="w-full bg-[#E50914] text-white font-bold py-4 rounded-xl mt-4 active:scale-95 transition shadow-[0_4px_20px_rgba(229,9,20,0.3)]">Create User</button>
            </form>
        </div>
    </div>

    <!-- MODAL: MANAGE SUBSCRIPTION -->
    <div id="sub-modal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-2xl flex items-center justify-center p-4">
        <div class="ios-glass w-full max-w-sm rounded-3xl shadow-2xl p-8 relative text-center">
            <button onclick="closeModal('sub-modal')" class="absolute top-5 right-5 text-gray-400 hover:text-white bg-white/10 p-2 rounded-full active:scale-95 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            <div class="w-16 h-16 mx-auto bg-gradient-to-br from-yellow-400 to-amber-600 rounded-full flex items-center justify-center mb-4 shadow-[0_0_15px_rgba(251,191,36,0.5)]">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="black"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-white mb-1 tracking-tight">Manage Plan</h2>
            <p id="sub-target-name" class="text-sm text-gray-400 mb-8 font-medium">User Name</p>
            
            <input type="hidden" id="sub-target-id">
            <div class="flex flex-col gap-3">
                <button onclick="saveSubscription('free')" class="w-full ios-glass-light hover:bg-white/10 text-white py-3.5 rounded-xl font-bold text-[14px] transition border border-white/10 active:scale-95">Revert to Free Plan</button>
                <button onclick="saveSubscription('week')" class="w-full bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 border border-blue-500/30 py-3.5 rounded-xl font-bold text-[14px] transition active:scale-95">1 Week (30 Rs)</button>
                <button onclick="saveSubscription('month')" class="w-full bg-green-600/20 hover:bg-green-600/40 text-green-400 border border-green-500/30 py-3.5 rounded-xl font-bold text-[14px] transition active:scale-95">1 Month (120 Rs)</button>
                <button onclick="saveSubscription('year')" class="w-full bg-gradient-to-r from-amber-500/20 to-yellow-600/20 hover:from-amber-500/40 hover:to-yellow-600/40 text-yellow-500 border border-yellow-500/30 py-3.5 rounded-xl font-bold text-[14px] transition shadow-[0_0_15px_rgba(251,191,36,0.1)] active:scale-95">1 Year (1000 Rs)</button>
            </div>
        </div>
    </div>


    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js";

        // Main App Config
        const firebaseConfig = {
            apiKey: "AIzaSyD4qx0cLM_sNiPVp5ktJgegYgs9eCwhT04",
            authDomain: "moizzflix.firebaseapp.com",
            projectId: "moizzflix"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const secondaryApp = initializeApp(firebaseConfig, "SecondaryApp");
        const secondaryAuth = getAuth(secondaryApp);

        // --- UPDATED HARDCODED ADMIN CREDENTIALS ---
        const ADMIN_EMAIL = "NetFilla@admin";
        const ADMIN_PASS = "Moiz42372@"; 

        const loginScreen = document.getElementById('admin-login-screen');
        const dashboard = document.getElementById('admin-dashboard');
        const loginForm = document.getElementById('admin-login-form');
        const tableBody = document.getElementById('users-table-body');

        if(sessionStorage.getItem('netfilla_admin_auth') === 'true') showDashboard();

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('admin-email').value;
            const passInput = document.getElementById('admin-password').value;
            if (emailInput === ADMIN_EMAIL && passInput === ADMIN_PASS) {
                sessionStorage.setItem('netfilla_admin_auth', 'true');
                showDashboard();
            } else { alert("Access Denied: Invalid Admin Credentials!"); }
        });

        window.adminLogout = function() {
            sessionStorage.removeItem('netfilla_admin_auth');
            dashboard.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            loginForm.reset();
        }

        function showDashboard() {
            loginScreen.classList.add('hidden');
            dashboard.classList.remove('hidden'); document.body.classList.remove('justify-center', 'items-center');
            fetchUsers();
        }

        window.openModal = (id) => { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        window.closeModal = (id) => { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }

        // ==========================
        // 1. FETCH & DISPLAY USERS
        // ==========================
        window.fetchUsers = async function() {
            tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-gray-500 font-medium"><div class="animate-spin w-8 h-8 border-4 border-[#E50914] border-t-transparent rounded-full mx-auto mb-3"></div>Fetching users...</td></tr>`;
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                tableBody.innerHTML = "";
                
                if (querySnapshot.empty) {
                    tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-gray-500 font-medium">No users found in database.</td></tr>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const userId = docSnap.id;
                    
                    const userName = data.username || data.fullName || 'Unknown User';
                    const safeName = userName.replace(/'/g, "\\'"); 
                    const userEmail = data.email || 'No Email';
                    const userPhone = data.phone || 'N/A';
                    
                    const isBanned = data.status === 'banned';
                    const statusBadge = isBanned 
                        ? `<span class="bg-red-500/10 text-red-500 border border-red-500/20 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">Banned</span>`
                        : `<span class="bg-green-500/10 text-green-400 border border-green-500/20 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">Active</span>`;

                    let planText = `<span class="text-gray-400 font-bold text-[13px]">Free Plan</span>`;
                    
                    // Fallback to older data structures if needed
                    const currentPlan = data.plan || (data.subscription ? data.subscription.plan : 'free');
                    const expiryRaw = data.subscription ? data.subscription.expiry : null;

                    if (currentPlan !== 'free' && currentPlan) {
                        let planName = currentPlan === 'week' ? '1 Week (30 Rs)' 
                                     : currentPlan === 'month' || currentPlan === '1 Month Premium' ? '1 Month (120 Rs)' 
                                     : currentPlan === 'year' || currentPlan === '1 Year Premium' ? '1 Year (1000 Rs)' : currentPlan;

                        if(expiryRaw) {
                            const expiry = new Date(expiryRaw);
                            const isExpired = expiry < new Date();
                            if(isExpired) planText = `<span class="text-red-400 font-bold text-[13px] line-through">${planName}</span><br><span class="text-[11px] text-red-500/70 font-medium mt-1 inline-block">Expired: ${expiry.toLocaleDateString()}</span>`;
                            else planText = `<span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500 font-black text-[13px]">${planName}</span><br><span class="text-[11px] text-gray-500 font-medium mt-1 inline-block">Ends: ${expiry.toLocaleDateString()}</span>`;
                        } else {
                            planText = `<span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500 font-black text-[13px]">${planName}</span>`;
                        }
                    }

                    const banBtnText = isBanned ? "Unban" : "Ban User";
                    const banBtnColor = isBanned ? "bg-white/10 hover:bg-white/20 text-white" : "bg-orange-500/20 text-orange-400 border border-orange-500/30 hover:bg-orange-500/30";

                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors border-b border-white/5 last:border-0 opacity-${isBanned ? '50' : '100'}">
                            <td class="px-6 py-4">${statusBadge}</td>
                            <td class="px-6 py-4">
                                <div class="text-white font-bold text-[15px] mb-0.5">${userName}</div>
                                <div class="text-gray-500 text-[12px] font-medium">${userEmail}</div>
                            </td>
                            <td class="px-6 py-4 text-gray-400 text-[13px] font-medium">${userPhone}</td>
                            <td class="px-6 py-4">${planText}</td>
                            
                            <td class="px-6 py-4 text-center">
                                <button onclick="openSubModal('${userId}', '${safeName}')" class="text-[11px] font-bold uppercase tracking-wider bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-4 py-2 rounded-lg transition active:scale-95 hover:bg-indigo-500/30">Update Plan</button>
                            </td>
                            
                            <td class="px-6 py-4 text-center flex justify-center gap-2">
                                <button onclick="toggleBan('${userId}', ${isBanned})" class="text-[11px] font-bold uppercase tracking-wider ${banBtnColor} px-4 py-2 rounded-lg transition active:scale-95">${banBtnText}</button>
                                <button onclick="deleteUser('${userId}')" class="text-[11px] font-bold uppercase tracking-wider bg-red-500/20 text-red-500 border border-red-500/30 px-4 py-2 rounded-lg transition active:scale-95 hover:bg-red-500/30">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-red-500 font-bold">Error loading data: ${error.message}</td></tr>`;
            }
        }

        // ==========================
        // 2. ADD NEW USER
        // ==========================
        document.getElementById('add-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('add-user-btn');
            
            const name = document.getElementById('new-name').value;
            const email = document.getElementById('new-email').value;
            const phone = document.getElementById('new-phone').value || "Not provided";
            const pass = document.getElementById('new-pass').value;
            const plan = document.getElementById('new-plan').value;

            btn.innerText = "Creating User..."; btn.disabled = true;

            try {
                const cred = await createUserWithEmailAndPassword(secondaryAuth, email, pass);
                await updateProfile(cred.user, { displayName: name });

                let subscriptionData = { plan: 'free', expiry: null };
                let simplePlanName = "Free";
                if (plan !== 'free') {
                    const expiryDate = new Date();
                    if(plan === 'week') { expiryDate.setDate(expiryDate.getDate() + 7); simplePlanName = "1 Week Premium"; }
                    if(plan === 'month') { expiryDate.setDate(expiryDate.getDate() + 30); simplePlanName = "1 Month Premium"; }
                    if(plan === 'year') { expiryDate.setDate(expiryDate.getDate() + 365); simplePlanName = "1 Year Premium"; }
                    subscriptionData = { plan: plan, expiry: expiryDate.toISOString() };
                }

                await setDoc(doc(db, "users", cred.user.uid), {
                    username: name, email: email, phone: phone, plan: simplePlanName, status: 'active', subscription: subscriptionData, joinDate: new Date().toISOString(),
                    profiles: [{ id: 1, name: name, avatarUrl: 'https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg', pin: "" }]
                });

                alert("User created successfully!");
                document.getElementById('add-user-form').reset();
                closeModal('add-user-modal');
                fetchUsers();

            } catch(error) { alert("Failed to add user: " + error.message); }
            btn.innerText = "Create User"; btn.disabled = false;
        });

        // ==========================
        // 3. MANAGE SUBSCRIPTIONS
        // ==========================
        window.openSubModal = function(userId, userName) {
            document.getElementById('sub-target-id').value = userId;
            document.getElementById('sub-target-name').innerText = userName;
            openModal('sub-modal');
        }

        window.saveSubscription = async function(planType) {
            const userId = document.getElementById('sub-target-id').value;
            let subscriptionData = { plan: 'free', expiry: null };
            let simplePlanName = "Free";

            if (planType !== 'free') {
                const expiryDate = new Date();
                if(planType === 'week') { expiryDate.setDate(expiryDate.getDate() + 7); simplePlanName = "1 Week Premium"; }
                if(planType === 'month') { expiryDate.setDate(expiryDate.getDate() + 30); simplePlanName = "1 Month Premium"; }
                if(planType === 'year') { expiryDate.setDate(expiryDate.getDate() + 365); simplePlanName = "1 Year Premium"; }
                subscriptionData = { plan: planType, expiry: expiryDate.toISOString() };
            }

            try {
                // Update both structures for safety
                await updateDoc(doc(db, "users", userId), { 
                    subscription: subscriptionData,
                    plan: simplePlanName 
                });
                closeModal('sub-modal');
                fetchUsers();
            } catch (error) { alert("Failed to update subscription: " + error.message); }
        }

        // ==========================
        // 4. BAN / UNBAN USERS
        // ==========================
        window.toggleBan = async function(userId, currentlyBanned) {
            const action = currentlyBanned ? "unban" : "ban (block)";
            if(confirm(`Are you sure you want to ${action} this user?`)) {
                try {
                    await updateDoc(doc(db, "users", userId), { status: currentlyBanned ? 'active' : 'banned' });
                    fetchUsers();
                } catch(e) { alert("Error updating status: " + e.message); }
            }
        }

        // ==========================
        // 5. DELETE USERS
        // ==========================
        window.deleteUser = async function(userId) {
            if(confirm("CRITICAL WARNING: Delete this user's profile from the database entirely?")) {
                try {
                    await deleteDoc(doc(db, "users", userId));
                    fetchUsers();
                } catch(e) { alert("Error deleting user: " + e.message); }
            }
        }
    </script>
</body>
</html>
